name: Build and deploy app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # Publishes dist/ to the gh-pages branch of veasyguide/app, which Pages
      # serves at veasyguide.github.io/app/. Auth is a fine-grained PAT scoped
      # to veasyguide/app (Contents: write), stored as APP_DEPLOY_TOKEN.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.APP_DEPLOY_TOKEN }}
          external_repository: veasyguide/app
          publish_dir: ./dist
          publish_branch: gh-pages
